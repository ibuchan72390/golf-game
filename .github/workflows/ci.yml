name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npx playwright install --with-deps chromium
      # Functional e2e specs (visual.spec.ts runs in the separate gated step below). Add new specs here.
      - run: npx playwright test e2e/round.spec.ts e2e/upgrade.spec.ts e2e/prompts.spec.ts e2e/settings.spec.ts e2e/touch.spec.ts e2e/friends.spec.ts
      - name: Visual snapshots (hard gate once baselines exist)
        run: |
          if [ -d e2e/visual.spec.ts-snapshots ]; then
            npx playwright test e2e/visual.spec.ts
          else
            echo "No baselines yet - run the 'Update visual snapshots' workflow to create them."
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
        # Multiplayer config is baked in at build time. Unset variables resolve to
        # empty strings → readConfig() returns null → multiplayer stays dormant
        # (single-player only). Set the Variables to light it up; no code change.
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_OIDC_ISSUER: ${{ vars.VITE_OIDC_ISSUER }}
          VITE_OIDC_CLIENT_ID: ${{ vars.VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_AUDIENCE: ${{ vars.VITE_OIDC_AUDIENCE }}
          VITE_OIDC_REDIRECT_URI: ${{ vars.VITE_OIDC_REDIRECT_URI }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
